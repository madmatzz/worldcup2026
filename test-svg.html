<!DOCTYPE html>
<html>
<body style="background: black;">
  <svg width="500" height="500" viewBox="0 0 500 500">
    <defs>
      <radialGradient id="flowGradient" cx="50%" cy="50%">
        <animate attributeName="r" values="100%;0%" dur="2s" repeatCount="indefinite" />
        <stop offset="0%" stopColor="#fbbf24" stopOpacity="0" />
        <stop offset="70%" stopColor="#fbbf24" stopOpacity="0" />
        <stop offset="90%" stopColor="#fbbf24" stopOpacity="1" />
        <stop offset="100%" stopColor="#fbbf24" stopOpacity="0" />
      </radialGradient>
    </defs>
    
    <path d="M 0 0 L 250 250" stroke="#fbbf24" stroke-opacity="0.2" stroke-width="2" fill="none" />
    <path d="M 0 0 L 250 250" stroke="url(#flowGradient)" stroke-width="2" fill="none" />
    
    <path d="M 500 0 L 250 250" stroke="#fbbf24" stroke-opacity="0.2" stroke-width="2" fill="none" />
    <path d="M 500 0 L 250 250" stroke="url(#flowGradient)" stroke-width="2" fill="none" />
  </svg>
</body>
</html>
